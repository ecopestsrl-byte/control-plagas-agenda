services:
  - type: web
    name: control-plagas-agenda
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATA_DIR
        value: /opt/render/project/src/data
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
    disk:
      name: control-plagas-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
