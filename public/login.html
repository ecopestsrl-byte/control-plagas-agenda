<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ingresar - PLAGA CONTROL PRO</title>
  <link rel="stylesheet" href="style.css">
  <style>
    * { box-sizing: border-box; }
    :root {
      --login-bg: #e9e9e9;
      --login-brand: #e2261c;
      --login-button: #e2261c;
    }
    body.login-body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--login-bg);
      color: #1e2723;
    }
    .login-card {
      width: min(340px, 92vw);
      min-height: 540px;
      background: #fff;
      border: 1px solid #cfcfcf;
      border-radius: 10px;
      box-shadow: 0 24px 40px rgba(0,0,0,.18);
      overflow: hidden;
      padding: 0 18px 28px;
      display: grid;
      align-content: start;
      gap: 18px;
    }
    .login-logo {
      min-height: 124px;
      display: grid;
      place-items: center;
      border-bottom: 1px solid #ededed;
      text-align: center;
      color: var(--login-brand);
    }
    .login-logo span {
      display: block;
      font-size: 66px;
      line-height: .9;
      font-weight: 900;
      letter-spacing: -3px;
    }
    .login-logo strong {
      display: block;
      margin-top: 7px;
      font-size: 18px;
      font-weight: 800;
      color: var(--login-brand);
    }
    #loginForm {
      display: grid;
      gap: 17px;
      padding-top: 2px;
    }
    #loginForm label {
      display: grid;
      gap: 8px;
      color: #2b2b2b;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 14px;
      font-weight: 400;
    }
    #loginForm input {
      width: 100%;
      height: 40px;
      border: 1px solid #d7d7d7;
      border-radius: 4px;
      padding: 8px 10px;
      background: #fff;
      font: 15px Arial, Helvetica, sans-serif;
      outline: none;
    }
    #loginForm input:focus {
      border-color: var(--login-brand);
      box-shadow: 0 0 0 3px rgba(226,38,28,.12);
    }
    .login-submit {
      width: 60px;
      height: 60px;
      justify-self: center;
      margin-top: -2px;
      display: grid;
      place-items: center;
      border: 3px solid var(--login-button);
      border-radius: 50%;
      background: white;
      color: var(--login-button);
      font-size: 34px;
      line-height: 1;
      padding: 0 0 4px;
      cursor: pointer;
    }
    .login-submit:hover { background: #fff4f3; }
    .login-text-submit {
      width: 100%;
      border: 0;
      background: var(--login-button);
      color: white;
      border-radius: 4px;
      padding: 11px 14px;
      font-weight: 700;
      cursor: pointer;
    }
    .login-text-submit:hover { background: #c91f17; }
    #loginMsg {
      color: var(--login-brand);
      min-height: 18px;
      text-align: center;
      font-size: 13px;
    }
    .forgot-link {
      color: var(--login-brand);
      font-family: Georgia, "Times New Roman", serif;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>
<body class="login-body">
  <main class="login-card">
      <div class="login-logo">
        <span id="loginInitials">CP</span>
        <strong id="loginTitle">PLAGA CONTROL PRO</strong>
      </div>
      <form id="loginForm">
        <label>Usuario<input id="username" autocomplete="username" required placeholder="Usuario"></label>
        <label>Contrasena<input id="password" type="password" autocomplete="current-password" required placeholder="Contrasena"></label>
        <label>Codigo de Compania<input id="companyCode" autocomplete="organization" value="CP"></label>
        <button class="login-submit" type="submit" aria-label="Ingresar">&rarr;</button>
        <button class="login-text-submit" type="submit">Entrar al sistema</button>
        <small id="loginMsg"></small>
      </form>
      <a class="forgot-link" href="#" onclick="event.preventDefault(); loginMsg.textContent='Solicita al administrador cambiar la contrasena en Configuracion.';">Olvidaste tu contrasena?</a>
  </main>
  <script>
    const form = document.getElementById("loginForm");
    let loginConfigTimer = null;
    async function loadLoginConfig(user = "") {
      try {
        const suffix = user ? `?username=${encodeURIComponent(user)}` : "";
        const res = await fetch(`/api/public-config${suffix}`);
        const data = await res.json();
        if (!data.ok) return;
        loginInitials.textContent = data.config.loginInitials || "CP";
        loginTitle.textContent = data.config.loginTitle || "Control Plagas";
        companyCode.value = data.config.companyCode || "CP";
        document.documentElement.style.setProperty("--login-bg", data.config.loginBackground || "#e9e9e9");
        document.documentElement.style.setProperty("--login-brand", data.config.loginBrandColor || "#e2261c");
        document.documentElement.style.setProperty("--login-button", data.config.loginButtonColor || "#e2261c");
      } catch (error) {}
    }
    loadLoginConfig();
    username.addEventListener("input", () => {
      clearTimeout(loginConfigTimer);
      loginConfigTimer = setTimeout(() => loadLoginConfig(username.value.trim()), 350);
    });
    username.addEventListener("blur", () => loadLoginConfig(username.value.trim()));
    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      loginMsg.textContent = "Conectando...";
      try {
        const res = await fetch("/api/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: username.value.trim(), password: password.value, companyCode: companyCode.value.trim() })
        });
        const data = await res.json();
        if (!data.ok) {
          loginMsg.textContent = data.error || "No se pudo ingresar";
          return;
        }
        location.href = "/";
      } catch (error) {
        loginMsg.textContent = "No se pudo conectar. Abre el sistema desde INICIAR-SISTEMA.bat.";
      }
    });
  </script>
</body>
</html>
